kind = "web"
previewPath = "/"
title = "RizaBrowser"
version = "1.0.0"
id = "artifacts/riza-browser"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21808

[services.development]
run = "pnpm --filter @workspace/riza-browser run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/riza-browser", "run", "build" ]
publicDir = "artifacts/riza-browser/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21808"
BASE_PATH = "/"
